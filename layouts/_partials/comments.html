<script>
  // Keep the (lazily loaded) Giscus iframe in sync with the page theme.
  // A postMessage sent before the iframe's document is listening is silently
  // dropped, so on every message Giscus sends us (it emits on load/resize)
  // we re-assert the theme once — self-healing, no timers or DOM observers.
  (function () {
    function currentTheme() {
      const page = document.documentElement.getAttribute("data-theme") || "dark";
      return page === "light" ? "light" : "dark_dimmed";
    }

    function postTheme() {
      const frame = document.querySelector("iframe.giscus-frame");
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(
          { giscus: { setConfig: { theme: currentTheme() } } },
          "https://giscus.app"
        );
      }
    }

    let pendingSync = true;

    function syncGiscusTheme() {
      // Keep the loader script's attribute fresh so a not-yet-loaded
      // (lazy) iframe starts with the right theme instead of a stale one.
      const loader = document.querySelector('script[src*="giscus.app"]');
      if (loader) loader.setAttribute("data-theme", currentTheme());
      postTheme();
      pendingSync = true;
    }

    // Runs before the async Giscus loader executes, so first paint is correct.
    syncGiscusTheme();

    new MutationObserver(syncGiscusTheme).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-theme"],
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== "https://giscus.app" || !pendingSync) return;
      pendingSync = false;
      postTheme();
    });
  })();
</script>
