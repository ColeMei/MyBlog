baseURL = 'https://blog.colemei.com'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
theme = "hermit-v2"
enableRobotsTXT = true

languageCode = "en-us"

[languages]
  [languages.en]
    locale = "en-US"

title = "Cole World"
# enableGitInfo = true

hasCJKLanguage = true

rssLimit = 10

copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License."
enableEmoji = true

[frontmatter]
date = ["date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":git", "date", "publishDate"]
publishDate = ["publishDate", "date"]
expiryDate = ["expiryDate"]


[params.author]
  name = "Cole Mei"
  about = "about"

[taxonomies]
  tag = "tags"
  series = "series"
  # Categories are disabled by default.
  # category = "categories"

# Enable to get proper Mathjax support
[markup]
  [markup.highlight]
    codeFences = true
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]


[params]

  # description = "Cole's Blog"
  # images = [""]
  themeColor = "#494f5c"

  homeSubtitle = "To be just a little less arrogant. To have just a little critical awareness about myself and my certainties."
  footerCopyright = ' <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
  footerHideThemeName = true
  # bgImg = ""  # Homepage background-image URL
  # gitUrl = "https://github.com/1bl4z3r/hermit-V2/tree/staging"

  justifyContent = false

  code_copy_button = true

  homeSubtitlePrinter = true
  scrollToTop = true
  global_mathjax = false
  # legacyLayout = false
  shareSocial = true
  # googleTagManager = "GTM-XXXXXXXX"
  # tagSymbol = "#"
  # categorySymbol = "⊲"
  pinned = "Pinned Posts"
  # pinnedSVGname = "pin"
  listLayout = ["description"]
  descriptionInPosts= true
  # initialPublish = "Initally Posted on: "
  # human = ["single","posts"]
  # noIndex = false
  # denyRobots = "noindex, nofollow, noarchive"
  # allowRobots = "index, follow"
  # siteNoIndex = false
  # noIndexPages = ["404 Page not found"]
  # usesAnimation = true

  [params.pages]
    relatedPosts = true
    readTimeSeparator = "… ⏲ Reading Time:"
    LastmodOpen = "["
    LastmodClose = "]"
    lastUpdatedOn = "Last updated on: "

  [params.gallery]
    enable  = true
    width   = "300"

  [params.dateform]
    LongDate = "Jan 2, 2006"
    ShortDate = "Jan 2"
    NumDateShort = "2006-01-02"
    NumDateLong = "2006-01-02 15:04 -0700"

  # Umami Analytics (https://umami.is)
  [params.umami]
    websiteId = "c66c8de9-42d3-4a3e-b903-5862a1336b13"
    scriptUrl = "https://cloud.umami.is/script.js"

[[cascade]]
  [cascade.params]
    readTime = true
  [cascade._target]
    path = "/posts/**"
    kind = "page"

[[params.socialLinks]]
  name = "telegram"
  url = "https://t.me/Colemei"

[[params.socialLinks]]
  name = "github"
  url = "https://github.com/ColeMei"

[menu]

  [[menu.main]]
    name = "Posts"
    url = "posts/"
    weight = 10

  [[menu.main]]
    name = "Collections"
    url = "collections/"
    weight = 20

  [[menu.main]]
    name = "Tags"
    url = "tags/"
    weight = 30

  [[menu.main]]
    name = "Links"
    url = "links/"
    weight = 40

  [[menu.main]]
    name = "About"
    url = "about/"
    weight = 50